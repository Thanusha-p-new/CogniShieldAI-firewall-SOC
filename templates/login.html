<!DOCTYPE html>
<html>
<head>
<title>Login - SecureGPT</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: #111827;
    padding: 30px;
    border-radius: 12px;
    width: 300px;
    box-shadow: 0 0 20px rgba(56,189,248,0.2);
}

h2 {
    color: #38bdf8;
    text-align: center;
}

input {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #0b1220;
    color: white;
}

button {
    width: 100%;
    padding: 10px;
    background: #38bdf8;
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
}

button:hover {
    background: #0ea5e9;
}
</style>
</head>

<body>

<div class="box">
    <h2>SecureGPT Login</h2>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script>
async function login() {
    const username = document.getElementById("user").value;
    const password = document.getElementById("pass").value;

    const res = await fetch("/auth", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({username, password})
    });

    if (res.redirected) {
        window.location.href = "/";
    } else {
        alert("Invalid login");
    }
}
</script>

</body>
</html>
